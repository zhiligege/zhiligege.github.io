<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMax 图像生成器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080d;
    --surface: #0f0f18;
    --surface2: #16162a;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6af7;
    --accent2: #c084fc;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #34d399;
    --error: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 52px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(124,106,247,0.3);
  }

  .header-text h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-text p {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .badge {
    margin-left: auto;
    background: rgba(124,106,247,0.12);
    border: 1px solid rgba(124,106,247,0.25);
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* Main layout */
  .main-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* Control Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .field textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 110px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .field textarea:focus {
    border-color: rgba(124,106,247,0.5);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.08);
  }

  .field select, .field input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    cursor: pointer;
  }

  .field select:focus, .field input:focus {
    border-color: rgba(124,106,247,0.5);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.08);
  }

  .select-wrapper {
    position: relative;
  }

  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 12px;
  }

  /* Row layout for small fields */
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Number control */
  .num-control {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .num-control button {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 10px 14px;
    cursor: pointer;
    font-size: 16px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  .num-control button:hover {
    color: var(--text);
    background: rgba(255,255,255,0.05);
  }

  .num-control span {
    flex: 1;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
  }

  /* API Key field */
  .key-field {
    position: relative;
  }

  .key-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 10px 40px 10px 14px;
    outline: none;
    letter-spacing: 0.5px;
  }

  .key-field input:focus {
    border-color: rgba(124,106,247,0.5);
    color: var(--text);
  }

  .key-field .toggle-key {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px;
  }

  /* Generate button */
  .gen-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .gen-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  }

  .gen-btn:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(124,106,247,0.35);
  }

  .gen-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .gen-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Output panel */
  .output-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 500px;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .output-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .output-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* Image grid */
  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* Empty state */
  .empty-state {
    background: var(--surface);
    border: 1px dashed rgba(124,106,247,0.2);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 420px;
    gap: 16px;
    color: var(--muted);
  }

  .empty-icon {
    width: 72px;
    height: 72px;
    background: rgba(124,106,247,0.08);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .empty-state h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .empty-state p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    max-width: 260px;
    line-height: 1.6;
  }

  /* Image card */
  .img-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    group: true;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .img-card img {
    width: 100%;
    display: block;
    aspect-ratio: 1;
    object-fit: cover;
  }

  .img-card .img-footer {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .img-card .img-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .img-card .download-btn {
    background: rgba(124,106,247,0.12);
    border: 1px solid rgba(124,106,247,0.2);
    color: var(--accent2);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }

  .img-card .download-btn:hover {
    background: rgba(124,106,247,0.2);
    border-color: rgba(124,106,247,0.4);
  }

  /* Loading state */
  .loading-state {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 420px;
    gap: 20px;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Error/Success toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 18px;
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    z-index: 100;
    max-width: 380px;
    animation: slideIn 0.3s ease;
    line-height: 1.5;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .toast.error {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--error);
  }

  .toast.success {
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    color: var(--success);
  }

  /* Prompt suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .sug-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .sug-chip:hover {
    border-color: rgba(124,106,247,0.4);
    color: var(--accent2);
    background: rgba(124,106,247,0.08);
  }

  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .image-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-mark">🎨</div>
    <div class="header-text">
      <h1>MiniMax 图像生成器</h1>
      <p>image-01 · api.minimax.chat</p>
    </div>
    <div class="badge">国内版 API</div>
  </header>

  <div class="main-grid">

    <!-- Control Panel -->
    <div class="panel">
      <div class="panel-title">// 生成参数</div>

      <div class="field">
        <label>提示词 Prompt</label>
        <textarea id="prompt" placeholder="描述你想生成的图像，支持中英文...&#10;&#10;例：一只赛博朋克风格的猫，霓虹灯下，高细节，写实摄影"></textarea>
        <div class="suggestions">
          <span class="sug-chip" onclick="setPrompt('赛博朋克城市夜景，霓虹灯倒影，写实风格')">🌆 赛博城市</span>
          <span class="sug-chip" onclick="setPrompt('水墨山水画，云雾缭绕，留白，写意风格')">🎋 水墨山水</span>
          <span class="sug-chip" onclick="setPrompt('未来科技感机器人，金属质感，工业设计，8K渲染')">🤖 科技机器人</span>
          <span class="sug-chip" onclick="setPrompt('极简主义产品摄影，白色背景，柔和阴影')">📦 产品摄影</span>
        </div>
      </div>

      <div class="field">
        <label>反向提示词 Negative Prompt（可选）</label>
        <textarea id="negative" placeholder="不希望出现的元素..." style="min-height:60px;"></textarea>
      </div>

      <div class="field-row">
        <div class="field">
          <label>图像比例</label>
          <div class="select-wrapper">
            <select id="ratio">
              <option value="1:1">1:1  正方形</option>
              <option value="16:9">16:9  横屏</option>
              <option value="9:16">9:16  竖屏</option>
              <option value="4:3">4:3  标准</option>
              <option value="3:4">3:4  人像</option>
              <option value="3:2">3:2  照片</option>
              <option value="2:3">2:3  杂志</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>生成数量</label>
          <div class="num-control">
            <button onclick="changeCount(-1)">−</button>
            <span id="countDisplay">1</span>
            <button onclick="changeCount(1)">+</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>模型</label>
        <div class="select-wrapper">
          <select id="model">
            <option value="image-01">image-01（标准）</option>
            <option value="image-01-dv2">image-01-dv2（增强）</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>API Key</label>
        <div class="key-field">
          <input type="password" id="apiKey" value="sk-cp-Q0BZ_fROWTLhU4uc1aNkF8fe-JLOWpKjKRrrEnj8IehWoSCCFBI-L1j7tp-GstR6__76SyvnY2jJ-xCwT-36TTZs8mDnvMrxNVKBfrpFB-oSRsW4l8NKe0s">
          <button class="toggle-key" onclick="toggleKey()">👁</button>
        </div>
      </div>

      <button class="gen-btn" id="genBtn" onclick="generate()">
        ✦ 开始生成
      </button>
    </div>

    <!-- Output Panel -->
    <div class="output-panel">
      <div class="output-header">
        <div class="output-title">// 生成结果</div>
        <div class="output-count" id="outputCount">0 张图像</div>
      </div>

      <div id="outputArea">
        <div class="empty-state">
          <div class="empty-icon">✦</div>
          <h3>等待生成</h3>
          <p>填写提示词并点击「开始生成」，图像将在此处显示</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  let count = 1;
  let totalGenerated = 0;

  function changeCount(delta) {
    count = Math.max(1, Math.min(4, count + delta));
    document.getElementById('countDisplay').textContent = count;
  }

  function toggleKey() {
    const input = document.getElementById('apiKey');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function setPrompt(text) {
    document.getElementById('prompt').value = text;
  }

  function showToast(msg, type = 'error', duration = 5000) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), duration);
  }

  async function generate() {
    const prompt = document.getElementById('prompt').value.trim();
    const negative = document.getElementById('negative').value.trim();
    const ratio = document.getElementById('ratio').value;
    const model = document.getElementById('model').value;
    const apiKey = document.getElementById('apiKey').value.trim();

    if (!prompt) {
      showToast('请输入提示词', 'error');
      return;
    }
    if (!apiKey) {
      showToast('请输入 API Key', 'error');
      return;
    }

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 生成中...';

    document.getElementById('outputArea').innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">正在调用 MiniMax API，请稍候...</div>
      </div>
    `;

    try {
      const body = {
        model: model,
        prompt: prompt,
        n: count,
        aspect_ratio: ratio,
      };
      if (negative) body.negative_prompt = negative;

      const response = await fetch('https://api.minimax.chat/v1/image_generation', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify(body),
      });

      const data = await response.json();
      console.log('API Response:', data);

      if (!response.ok) {
        const errMsg = data?.error?.message || data?.message || data?.base_resp?.status_msg || JSON.stringify(data);
        throw new Error(`API 错误 ${response.status}: ${errMsg}`);
      }

      // Parse response — handle multiple possible formats
      let images = [];

      // Format 1: data.data.image_urls[]
      if (data?.data?.image_urls && Array.isArray(data.data.image_urls)) {
        images = data.data.image_urls.map(url => ({ type: 'url', value: url }));
      }
      // Format 2: data.images[].url
      else if (data?.images && Array.isArray(data.images)) {
        images = data.images.map(img => ({
          type: img.url ? 'url' : 'b64',
          value: img.url || img.b64_json,
        }));
      }
      // Format 3: data.data[].b64_json or .url
      else if (data?.data && Array.isArray(data.data)) {
        images = data.data.map(img => ({
          type: img.url ? 'url' : 'b64',
          value: img.url || img.b64_json,
        }));
      }
      // Format 4: single image
      else if (data?.image_url) {
        images = [{ type: 'url', value: data.image_url }];
      }
      // Format 5: b64_json at top level
      else if (data?.b64_json) {
        images = [{ type: 'b64', value: data.b64_json }];
      }

      if (images.length === 0) {
        throw new Error('未能从响应中解析图像，原始响应：' + JSON.stringify(data).slice(0, 200));
      }

      totalGenerated += images.length;
      document.getElementById('outputCount').textContent = `${totalGenerated} 张图像`;

      const grid = document.createElement('div');
      grid.className = 'image-grid';

      images.forEach((img, i) => {
        const src = img.type === 'b64'
          ? `data:image/png;base64,${img.value}`
          : img.value;

        const card = document.createElement('div');
        card.className = 'img-card';
        card.style.animationDelay = `${i * 80}ms`;
        card.innerHTML = `
          <img src="${src}" alt="Generated image ${i+1}" onerror="this.style.display='none'">
          <div class="img-footer">
            <div class="img-meta">${ratio} · ${new Date().toLocaleTimeString('zh-CN')}</div>
            <button class="download-btn" onclick="downloadImage('${src}', ${i+1})">↓ 下载</button>
          </div>
        `;
        grid.appendChild(card);
      });

      document.getElementById('outputArea').innerHTML = '';
      document.getElementById('outputArea').appendChild(grid);
      showToast(`成功生成 ${images.length} 张图像`, 'success');

    } catch (err) {
      console.error(err);
      let errMsg = err.message;
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('CORS')) {
        errMsg = 'CORS / 网络错误：浏览器直接调用 API 可能被拦截。请尝试在本地服务器环境运行此页面，或使用代理。';
      }
      document.getElementById('outputArea').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠</div>
          <h3>生成失败</h3>
          <p style="color:#f87171;">${errMsg}</p>
        </div>
      `;
      showToast(errMsg, 'error', 8000);
    } finally {
      btn.disabled = false;
      btn.textContent = '✦ 开始生成';
    }
  }

  function downloadImage(src, idx) {
    const a = document.createElement('a');
    a.href = src;
    a.download = `minimax_${Date.now()}_${idx}.png`;
    a.click();
  }
</script>
</body>
</html>
